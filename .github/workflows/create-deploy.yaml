name: Deploy Portfolio with Terraform

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: "us-east-1" 
  S3_BUCKET: "daniel-resumewebsite" 

permissions:
  id-token: write
  contents: read    

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site (Vite)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::211125482456:role/GitHubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Upload built site to S3
        run: |
          # Vite build output (dist/) is the single source of truth for the site.
          # --delete removes stale objects from previous deploys.
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve
      
      - name: Terraform Outputs
        id: tf_outputs
        working-directory: infra
        run: |
          url=$(terraform output -raw cloudfront_domain_name 2>/dev/null | tr -d '\n' | xargs)
          echo "CLOUDFRONT_URL=$url" >> $GITHUB_ENV

      - name: Add CloudFront URL to Workflow Summary
        run: |
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Your site is live at: [https://${CLOUDFRONT_URL}](https://${CLOUDFRONT_URL})" >> $GITHUB_STEP_SUMMARY




